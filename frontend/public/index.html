<!doctype html>
<html lang="tr">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#4B6858" />
        <meta name="description" content="Öğretmen Çantası · Okul Öncesi Eğitim Yönetim Sistemi" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Figtree:wght@400;500;600&display=swap" rel="stylesheet" />
        <title>Öğretmen Çantası</title>
        <script>window.addEventListener("error",function(e){if(e.error instanceof DOMException&&e.error.name==="DataCloneError"&&e.message&&e.message.includes("PerformanceServerTiming")){e.stopImmediatePropagation();e.preventDefault()}},true);</script>
        <script src="https://assets.emergent.sh/scripts/emergent-main.js"></script>
        <script>
          // Remove/hide the Made-with-Emergent badge whenever it appears
          (function(){
            function kill() {
              var nodes = document.querySelectorAll('#emergent-badge, a[href*="emergent-badge"], a[href*="app.emergent.sh"]');
              nodes.forEach(function(n){
                try { n.style.setProperty('display','none','important'); } catch(_){}
                try { n.remove(); } catch(_){}
              });
            }
            kill();
            if (document.body) {
              var obs = new MutationObserver(kill);
              obs.observe(document.documentElement, { childList: true, subtree: true });
            } else {
              document.addEventListener('DOMContentLoaded', function(){
                kill();
                var obs = new MutationObserver(kill);
                obs.observe(document.documentElement, { childList: true, subtree: true });
              });
            }
            setInterval(kill, 800);
          })();
        </script>
        <style>
          #emergent-badge { display: none !important; visibility: hidden !important; opacity: 0 !important; pointer-events: none !important; }
        </style>
    </head>
    <body>
        <noscript>Bu uygulamayı görüntülemek için JavaScript'i etkinleştirmeniz gerekir.</noscript>
        <div id="root"></div>
    </body>
</html>
